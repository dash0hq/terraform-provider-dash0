name: CI

on:
  push:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: './go.mod'

      - name: Linting
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.9

      - name: Build & Unit Test
        run: |
          go mod download
          make build
          make test

      - name: Configure AWS credentials
        if: ${{ secrets.CI_CD_AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          aws-access-key-id: ${{ secrets.CI_CD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CI_CD_AWS_SECRET_ACCESS_KEY }}
          role-to-assume: arn:aws:iam::211528226525:role/Dash0DeveloperAssumeRole
          role-skip-session-tagging: true
          aws-region: eu-west-1

      - name: Acceptance Tests
        if: ${{ secrets.DASH0_AUTH_TOKEN != '' }}
        run: make testacc
        env:
          DASH0_URL: ${{ secrets.DASH0_URL }}
          DASH0_AUTH_TOKEN: ${{ secrets.DASH0_AUTH_TOKEN }}
          DASH0_TEST_EXTERNAL_ID: ${{ secrets.DASH0_TEST_EXTERNAL_ID }}
