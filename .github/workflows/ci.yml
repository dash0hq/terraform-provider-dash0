name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: './go.mod'

      - name: Set up Terraform CLI
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Linting
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.9
          install-mode: goinstall

      - name: Build & Test
        run: |
          make build
          make testacc
        env:
          DASH0_URL: ${{ secrets.DASH0_URL }}
          DASH0_AUTH_TOKEN: ${{ secrets.DASH0_AUTH_TOKEN }}

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: './go.mod'

      - name: Install golangci-lint
        run: make lint-go-install

      - name: Run golangci-lint
        run: make lint-go

  lint-sh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run ShellCheck
        run: make lint-sh

  sync-docs-to-website-dry-run:
    # Drift guard: verify on every CI build that the transformations declared in
    # `.github/workflows/sync-docs/transformations.yaml` still apply cleanly against the current
    # docs. The real sync (dry-run: false) runs from `release.yml` after a release is published.
    name: Synchronize docs with dash0.com/docs (dry-run)
    uses: ./.github/workflows/sync-docs-to-website.yaml
    with:
      dry-run: true
