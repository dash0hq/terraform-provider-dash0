name: Synchronize docs to dash0.com/docs

# Copies the user-facing terraform-provider-dash0 documentation into the site that powers
# https://www.dash0.com/docs, applying the transformations declared in
# `.github/workflows/sync-docs/transformations.yaml`, and opens a pull request against the target
# documentation repository.
#
# Two modes:
#
#   - dry-run: applies the transformations and coverage check, then stops — no target checkout,
#     no copy, no PR. Needs no target-side inputs or secrets. Runnable on demand via
#     `workflow_dispatch` when you want to verify the transformations still apply cleanly against
#     the current docs.
#
#   - full sync (workflow_call from release.yml, or workflow_dispatch with dry-run unchecked):
#     runs sync-docs-action end-to-end and opens/updates a PR on the target repository. Requires
#     three secrets: SYNC_DOCUMENTATION_TARGET_REPOSITORY (owner/name of the target repo),
#     SYNC_DOCUMENTATION_TARGET_DIRECTORY (path within the target repo the sync writes into), and
#     DOCS_WEBSITE_PR_TOKEN (fine-grained PAT with `contents:write` and `pull-requests:write` on
#     the target repository).

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Only verify the transformations still apply cleanly; do not open a pull request.
        type: boolean
        default: true
  workflow_call:
    inputs:
      dry-run:
        description: Only verify the transformations still apply cleanly; do not open a pull request.
        type: boolean
        default: false
    secrets:
      SYNC_DOCUMENTATION_TARGET_REPOSITORY:
        description: owner/name of the target documentation repository. Only required when dry-run is false.
        required: false
      SYNC_DOCUMENTATION_TARGET_DIRECTORY:
        description: Path within the target repository the sync writes into. Only required when dry-run is false.
        required: false
      DOCS_WEBSITE_PR_TOKEN:
        description: Fine-grained PAT with contents+pull-requests write on the target documentation repository. Only required when dry-run is false.
        required: false

jobs:
  sync-docs:
    name: Synchronize terraform-provider-dash0 docs with dash0.com/docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout terraform-provider-dash0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # One invocation serves both modes; `dry-run` decides. `source-root` and `transformations-file`
      # inherit their defaults (`.` and `.github/workflows/sync-docs/transformations.yaml`).
      - name: sync docs to dash0.com/docs
        uses: dash0hq/sync-docs-action@3fbe55fed800da21ee24d6b6dba1a86435f61565 # v0.4.0
        with:
          dry-run: ${{ inputs.dry-run }}
          target-repository: ${{ secrets.SYNC_DOCUMENTATION_TARGET_REPOSITORY }}
          target-directory: ${{ secrets.SYNC_DOCUMENTATION_TARGET_DIRECTORY }}
          target-github-token: ${{ secrets.DOCS_WEBSITE_PR_TOKEN }}
          pr-branch: sync-terraform-provider-dash0-docs
          pr-title: 'docs: synchronize terraform-provider-dash0 documentation'
          pr-body: |
            This PR synchronizes the content of the [terraform-provider-dash0](https://github.com/dash0hq/terraform-provider-dash0) documentation into the documentation on https://www.dash0.com/docs.
