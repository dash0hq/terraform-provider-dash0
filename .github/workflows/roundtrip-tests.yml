name: Roundtrip Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  roundtrip:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build test image and run roundtrip tests
        run: ./test/roundtrip/run_all.sh
        env:
          DASH0_API_URL: ${{ secrets.DASH0_API_URL }}
          DASH0_AUTH_TOKEN: ${{ secrets.DASH0_AUTH_TOKEN }}
          DASH0_DATASET: ${{ secrets.DASH0_DATASET }}
