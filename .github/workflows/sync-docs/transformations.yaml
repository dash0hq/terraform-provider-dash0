# Transformations applied to the terraform-provider-dash0 docs before they are copied into the Dash0
# documentation repository. See ../sync-docs-to-website.yaml for the workflow that consumes this file.
#
# `files:` is the sole opt-in list — anything in the source repo that is not declared here is ignored.
#
# The `nav:` block emits a matching nav.json alongside the synced pages. sync-docs-action v0.3.0 derives
# the nav tree from the on-disk hierarchy of the `target` paths: files that share the common directory
# prefix appear as top-level leaves under `items[0]`, and files that sit in a deeper subdirectory
# (`resources/` and `guides/` here) are nested inside a `{ title, children }` group whose title is looked
# up in `groupTitles`. The `dash0/miscellaneous/tooling/terraform-provider-dash0/` prefix on every
# `target` matches the layout that `dash0hq/dash0-website` renders under Miscellaneous → Tooling.
#
# The `docs/resources/*.md` and `docs/guides/*.md` sources are generated by terraform-plugin-docs (via
# `make docs`) and committed to the repo — each carries a YAML frontmatter block plus a leading
# top-level heading. The `docs/about.md` source is authored by hand as the dash0.com/docs landing page
# and only carries the top-level heading. The `common` transformations strip both artefacts (frontmatter
# only where it exists; heading always) because sync-docs-action prepends its own frontmatter from the
# per-file `title`/`description` below and the website renders that title as the page heading.
#
# See https://github.com/dash0hq/sync-docs-action for the transformation-engine reference.

common:
  - description: strip the terraform-plugin-docs generated YAML frontmatter block (absent from hand-authored docs/about.md, present in every generated file)
    type: replace-regex
    find: '^---\n[\s\S]*?\n---\n'
    replace: ''
    required: false
  - description: strip the leading top-level heading (the frontmatter title replaces it)
    type: replace-regex
    find: '^\n*# [^\n]*\n'
    replace: ''
  - description: rewrite absolute dash0.com/docs URLs to site-internal root-relative paths so links stay within the current environment (dev/staging/prod) instead of bouncing through the public host
    type: replace-regex
    find: '\]\(https://(?:www\.)?dash0\.com/docs/([^)]+)\)'
    replace: '](/docs/\1)'
    required: false
  - description: rewrite Terraform-registry ~> Note admonitions to GitHub-style [!NOTE] callouts (source stays Registry-native because published providers universally use ~>/->/!>; dash0.com/docs renders the GitHub-style admonition natively)
    type: replace-regex
    find: '^~> \*\*Note:\*\* (.*)$'
    flags: [multiline]
    replace: "> [!NOTE]\n> \\1"
    required: false

