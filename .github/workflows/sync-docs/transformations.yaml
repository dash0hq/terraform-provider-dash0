  # provider's section, distinct from docs/index.md which serves as the Terraform Registry landing
  # page (generated by terraform-plugin-docs). The relative links inside docs/about.md use
  # dash0.com/docs URL conventions (hyphens, no `.md` suffix), so they resolve on the website
  # without needing rewrites; they do not resolve on GitHub, and are not intended to.
