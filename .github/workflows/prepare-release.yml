name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        default: minor
        options:
          - major
          - minor
          - patch

jobs:
  prepare:
    name: Prepare and Tag Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.REPOSITORY_FULL_ACCESS_GITHUB_TOKEN }}

      - name: Calculate next version
        id: version
        run: |
          # Find the highest semver tag (not necessarily the latest by date)
          HIGHEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)
          if [ -z "$HIGHEST" ]; then
            HIGHEST="0.0.0"
          fi
          echo "Highest existing version: $HIGHEST"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$HIGHEST"
          case "${{ inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag does not exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.version }}$"; then
            echo "Error: Tag v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi
          echo "Tag v${{ steps.version.outputs.version }} is available"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c #v6
        with:
          go-version-file: './go.mod'

      - name: Validate changelog entries exist
        run: |
          ENTRY_COUNT=$(find .chloggen -name "*.yaml" ! -name "config.yaml" ! -name "TEMPLATE.yaml" | wc -l)
          if [ "$ENTRY_COUNT" -eq 0 ]; then
            echo "Error: No changelog entries found in .chloggen/"
            exit 1
          fi
          echo "Found $ENTRY_COUNT changelog entries"

      - name: Update changelog
        run: make chlog-update VERSION=${{ steps.version.outputs.version }}

      - name: Commit and push changelog
        env:
          GH_TOKEN: ${{ secrets.REPOSITORY_FULL_ACCESS_GITHUB_TOKEN }}
        run: |
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          find .chloggen -name "*.yaml" ! -name "config.yaml" ! -name "TEMPLATE.yaml" -exec git rm -f {} + 2>/dev/null || true
          git add CHANGELOG.md .chloggen
          git commit -m "chore: update changelog for v${{ steps.version.outputs.version }}"
          git push origin main

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.REPOSITORY_FULL_ACCESS_GITHUB_TOKEN }}
        run: |
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}

      - name: Summary
        run: |
          echo "## Release v${{ steps.version.outputs.version }} prepared!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The release workflow has been triggered automatically." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View the release progress: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/release.yml" >> $GITHUB_STEP_SUMMARY
