# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern (e.g. dashboards, check_rules, views)
component: provider

# A brief description of the change. Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Adding support for fallback authentication using pre-configured dash0 CLI profiles.

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues:
  - 65

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Adds support for authentication to dash0 using CLI configuration files.
  Introduces a new optional provider attribute called `profile`.

  To build an API Client Provider will load credentials in the following
  precendence
  - Try to Load DASH0_URL and DASH0_AUTH_TOKEN from environment variables.
  - If not found will try to load values from attributes configured i.e. `url`
    or `auth_token` attributes.
  - If still not found, will read the `profile` attribute and try to find a
    dash0 CLI profile with the same name and load the missing `url` or
    `auth_token` from it.
  - If an empty provider block was defined the provider will check if a dash0
    CLI configuration directory exists and an `activeProfile` is defined if it is
    it will load the missing values of `url` or `auth_token` from it.

